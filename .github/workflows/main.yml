name: Deploy boletas-api Backend

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Restore dependencies
        run: dotnet restore

      - name: Publish Backend
        run: dotnet publish -c Release -o publish

      - name: Deploy to server
        run: |
          APP_NAME="boletas-api"
          APP_DIR="/var/www/$APP_NAME"

          if [ ! -d "publish" ]; then
            echo "❌ No existe carpeta publish"
            exit 1
          fi

          echo "▶ Copiando archivos con rsync..."
          sudo mkdir -p $APP_DIR
          sudo rsync -av --delete publish/ $APP_DIR/

          echo "▶ Permisos..."
          sudo chown -R deploy:deploy $APP_DIR

          echo "▶ Reiniciando servicio..."
          sudo systemctl restart $APP_NAME

      - name: Verificar servicio
        run: sudo systemctl status boletas-api --no-pager

      - name: Reload nginx
        run: sudo systemctl reload nginx
